name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_DB_URL: jdbc:mariadb://127.0.0.1:3306/ticketing_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
      TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
      TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}

    services:
      mariadb:
        image: mariadb:11.6
        ports:
          - 3306:3306
        env:
          MARIADB_DATABASE: ticketing_test
          MARIADB_USER: ${{ secrets.TEST_DB_USERNAME }}
          MARIADB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -p${{ secrets.MARIADB_ROOT_PASSWORD }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check required secrets are present
        run: |
          test -n "${{ secrets.TEST_DB_USERNAME }}" || (echo "Missing TEST_DB_USERNAME" && exit 1)
          test -n "${{ secrets.TEST_DB_PASSWORD }}" || (echo "Missing TEST_DB_PASSWORD" && exit 1)
          test -n "${{ secrets.MARIADB_ROOT_PASSWORD }}" || (echo "Missing MARIADB_ROOT_PASSWORD" && exit 1)

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p"${MARIADB_ROOT_PASSWORD}" --silent; then
              echo "MariaDB is up"
              exit 0
            fi
            echo "Waiting for MariaDB..."
            sleep 2
          done
          echo "MariaDB did not become ready in time"
          exit 1

      - name: Run tests (test profile)
        run: ./gradlew clean test --no-daemon --stacktrace -Dspring.profiles.active=test
        env:
          # Spring Boot가 확실히 인식하는 표준 키로 강제 주입
          SPRING_DATASOURCE_URL: ${{ env.TEST_DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver

      - name: Upload test report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test