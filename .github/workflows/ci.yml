name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.6
        ports:
          - 3306:3306
        env:
          MARIADB_DATABASE: ticketing_test
          MARIADB_USER: ${{ secrets.TEST_DB_USERNAME }}
          MARIADB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}

      redis:
        image: redis:7.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -p"${{ secrets.MARIADB_ROOT_PASSWORD }}" --silent; then
              echo "MariaDB is up"
              exit 0
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done
          echo "MariaDB did not become ready in time"
          exit 1

      - name: Run tests (test profile)
        run: ./gradlew clean test --no-daemon --stacktrace -Dspring.profiles.active=test
        env:
          TEST_DB_URL: jdbc:mariadb://127.0.0.1:3306/ticketing_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
          TEST_DB_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
          TEST_DB_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Upload test report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test