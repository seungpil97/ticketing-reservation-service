server:
  port: 8080

spring:
  config:
    activate:
      on-profile: dev
    import:
      - classpath:application-common.yml

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DEV_DB_HOST:127.0.0.1}:${DEV_DB_PORT:13305}/ticketing_flyway?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: ${DEV_DB_USERNAME:ticketing_user}
    password: ${DEV_DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET:ticketing-secret-key-must-be-at-least-32-characters}
  expiration-ms: 900000          # 15분
  refresh-expiration-ms: 604800000  # 7일

queue:
  scheduler:
    batch-size: 5          # 스케줄러 1회 실행 시 입장 허용 인원
    fixed-delay-ms: 10000  # 스케줄러 실행 주기 (10초)

# dev에서는 SQL 로그 보는 게 편함 (common이 이미 debug/trace면 굳이 안 써도 됨)
# logging:
#   level:
#     org.hibernate.SQL: debug
#     org.hibernate.orm.jdbc.bind: trace