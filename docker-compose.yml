services:
  mariadb-dev:
    image: mariadb:11.6
    container_name: ticketing-mariadb-dev
    ports:
      - "13305:3306"
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: ticketing_flyway
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "${MARIADB_USER}", "-p${MARIADB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mariadb-test:
    image: mariadb:11.6
    container_name: ticketing-mariadb-test
    ports:
      - "13307:3306"
    env_file:
      - .env
    environment:
      MARIADB_DATABASE: ticketing_test
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-u", "${MARIADB_USER}", "-p${MARIADB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mariadb_dev_data:
  mariadb_test_data: